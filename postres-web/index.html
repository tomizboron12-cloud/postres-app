input,select,textarea{font-family:inherit;font-size:16px}

.btn-dark{background:var(--choco);color:#fff}

/* ===================== HELPERS ===================== */
const COLORS = { frutilla:'#D9536B', frutillaDark:'#B93F55', dulce:'#C48A3F', menta:'#5C8A6E', choco:'#2B1B14', chocoSoft:'#4A342A' };
const money = (n) => (n<0?'-$':'$') + Math.abs(Math.round(n||0)).toLocaleString('es-AR');
const todayISO = () => new Date().toISOString().slice(0,10);
const monthKey = (iso) => (iso || todayISO()).slice(0,7);
const monthLabel = (key) => { const [y,m]=key.split('-'); const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return `${meses[parseInt(m,10)-1]} ${y}`; };
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const CURRENT_USER_KEY = 'postres-current-user';

/* ===================== ESTADO GLOBAL ===================== */
let DATA = { owners:[{id:'ella',name:'Sofi'},{id:'mama',name:'Mamá'}], products:[], clients:[], sales:[], purchases:[], loyalty:{threshold:10,reward:'1 postre gratis'}, ingredients:[], recipes:[], packagingCatalog:[], costProducts:[], shoppingListManual:[], workInProgress:[] };
let TAB = 'dashboard';
let MODAL = null;
let SEARCH_Q = '';
let LOADED = false;
let SAVING = false;
let DASHBOARD_EXPANDED = false;

function ownerName(id){ return (DATA.owners.find(o=>o.id===id)||{}).name || id; }
function clientMap(){ return Object.fromEntries(DATA.clients.map(c=>[c.id,c])); }
function productMap(){ return Object.fromEntries(DATA.products.map(p=>[p.id,p])); }
function currentUser(){ return localStorage.getItem(CURRENT_USER_KEY); }

/* ===================== CARGA DE DATOS (SUPABASE) ===================== */
async function loadAll(){
  const [ownersR, productsR, clientsR, salesR, purchasesR, loyaltyR, ingredientsR, recipesR, packagingR, costProductsR, shoppingR, wipR] = await Promise.all([
    sb.from('owners').select('*').order('id'),
    sb.from('products').select('*').order('created_at'),
    sb.from('clients').select('*').order('name'),
    sb.from('sales').select('*, sale_items(*), sale_bags(*)').order('date', {ascending:false}),
    sb.from('purchases').select('*').order('date', {ascending:false}),
    sb.from('loyalty_config').select('*').eq('id',1).maybeSingle(),
    sb.from('ingredients').select('*').order('name'),
    sb.from('recipes').select('*, recipe_items(*)').order('name'),
    sb.from('packaging_catalog').select('*').order('name'),
    sb.from('cost_products').select('*, cost_product_ingredients(*), cost_product_recipes(*), cost_product_packaging(*)').order('name'),
    sb.from('shopping_list_manual').select('*').order('created_at'),
    sb.from('work_in_progress').select('*').order('created_at'),
  ]);
  if(ownersR.data) DATA.owners = ownersR.data.map(o=>({id:o.id, name:o.name}));
  if(productsR.data) DATA.products = productsR.data.map(p=>({id:p.id, name:p.name, cost:+p.cost, price:+p.price, ownerId:p.owner_id, trackStock:p.track_stock, stock:p.stock, lowStockAlert:p.low_stock_alert, costProductId:p.cost_product_id}));
  if(clientsR.data) DATA.clients = clientsR.data.map(c=>({id:c.id, name:c.name, phone:c.phone||'', purchaseCount:c.purchase_count||0}));
  if(salesR.data) DATA.sales = salesR.data.map(s=>({
    id:s.id, date:s.date, clientId:s.client_id, paymentMethod:s.payment_method, discount:+s.discount,
    items:(s.sale_items||[]).map(it=>({productId:it.product_id, productName:it.product_name, ownerId:it.owner_id, qty:it.qty, cost:+it.cost, price:+it.price})),
    bagsUsed:(s.sale_bags||[]).map(b=>({packagingId:b.packaging_id, qty:+b.qty}))
  }));
  if(purchasesR.data) DATA.purchases = purchasesR.data.map(p=>({id:p.id, description:p.description, amount:+p.amount, date:p.date, ownerId:p.owner_id, category:p.category, ingredientId:p.ingredient_id, ingredientQty:p.ingredient_qty!=null?+p.ingredient_qty:null, packagingId:p.packaging_id, packagingQty:p.packaging_qty!=null?+p.packaging_qty:null}));
  if(loyaltyR.data) DATA.loyalty = {threshold:loyaltyR.data.threshold, reward:loyaltyR.data.reward};
  if(ingredientsR.data) DATA.ingredients = ingredientsR.data.map(i=>({id:i.id, name:i.name, price:+i.price, packageQty:+i.package_qty, unit:i.unit, currentStock:+i.current_stock||0, lowStockAlert:+i.low_stock_alert||0}));

let realtimeTimer = null;
function scheduleReload(){
  clearTimeout(realtimeTimer);
  realtimeTimer = setTimeout(async () => { await loadAll(); render(); }, 350);
}
function subscribeRealtime(){
  const channel = sb.channel('postres-sync');
  ['products','clients','sales','sale_items','purchases','loyalty_config','owners',
   'ingredients','recipes','recipe_items','packaging_catalog','cost_products','cost_product_ingredients','cost_product_recipes','cost_product_packaging',
   'shopping_list_manual','work_in_progress','sale_bags'].forEach(table => {
    channel.on('postgres_changes', {event:'*', schema:'public', table}, scheduleReload);
  });
  channel.subscribe();
}

async function init(){
  render();
  await loadAll();
  subscribeRealtime();
  render();
}

function computeMetrics(){
  const byMonth = {};
  for(const s of DATA.sales){
    const mk = monthKey(s.date);
    byMonth[mk] = byMonth[mk] || { revenue:0, cost:0, grossProfit:0, profit:0, grossByOwner:{}, byOwner:{} };
    for(const it of s.items){
      const rev = it.price*it.qty, cost = it.cost*it.qty, itemGrossProfit = rev-cost;
      byMonth[mk].revenue += rev; byMonth[mk].cost += cost;
      // grossProfit es solo INFORMATIVO (ventas - costo de producto), para ver márgenes.
      byMonth[mk].grossProfit += itemGrossProfit;
      byMonth[mk].grossByOwner[it.ownerId] = (byMonth[mk].grossByOwner[it.ownerId]||0) + itemGrossProfit;
      // profit (Ganancia Neta) arranca de las VENTAS, no del margen. El costo del
      // producto NO se resta acá: la plata que se gasta comprando mercadería ya se
      // descuenta más abajo, una sola vez, a través de las Compras/Gastos reales.
      byMonth[mk].profit += rev;
      byMonth[mk].byOwner[it.ownerId] = (byMonth[mk].byOwner[it.ownerId]||0) + rev;
    }
  }
  for(const pur of DATA.purchases){
    const mk = monthKey(pur.date);
    byMonth[mk] = byMonth[mk] || { revenue:0, cost:0, grossProfit:0, profit:0, grossByOwner:{}, byOwner:{} };
    // Ganancia Neta = Ventas - TODOS los gastos del mes (ingredientes, packaging,
    // delivery, marketing, todo). Es la plata real que quedó en el bolsillo,
    // sin importar la categoría del gasto.
    byMonth[mk].profit -= pur.amount;
    byMonth[mk].byOwner[pur.ownerId] = (byMonth[mk].byOwner[pur.ownerId]||0) - pur.amount;
  }
  return byMonth;
}

/* ===================== CALCULADORA DE COSTOS (helpers) ===================== */
function ingredientCostPerUnit(ing){
  if(!ing || !ing.packageQty) return 0;
  return ing.price / ing.packageQty;
}
function ingredientMap(){ return Object.fromEntries(DATA.ingredients.map(i=>[i.id,i])); }
function recipeMap(){ return Object.fromEntries(DATA.recipes.map(r=>[r.id,r])); }
function packagingMap(){ return Object.fromEntries(DATA.packagingCatalog.map(p=>[p.id,p])); }

function recipeCostTotal(recipe){
  const iMap = ingredientMap();
  return (recipe.items||[]).reduce((a,it) => {
    const ing = iMap[it.ingredientId];
    return a + (ing ? ingredientCostPerUnit(ing) * it.qty : 0);
  }, 0);
}
function recipeCostPerUnit(recipe){
  const total = recipeCostTotal(recipe);
  if(!recipe.yieldQty) return 0;
  return total / recipe.yieldQty;
}
function costProductBreakdown(cp){
  const iMap = ingredientMap(), rMap = recipeMap(), pMap = packagingMap();
  const directTotal = (cp.directIngredients||[]).reduce((a,it) => {
    const ing = iMap[it.ingredientId];
    return a + (ing ? ingredientCostPerUnit(ing) * it.qty : 0);
  }, 0);
  const recipesTotal = (cp.recipesUsed||[]).reduce((a,it) => {
    const r = rMap[it.recipeId];
    return a + (r ? recipeCostPerUnit(r) * it.qty : 0);
  }, 0);
  const packagingTotal = (cp.packagingIds||[]).reduce((a,pid) => {
    const p = pMap[pid];
    return a + (p ? p.cost : 0);
  }, 0);
  return { directTotal, recipesTotal, packagingTotal, total: directTotal + recipesTotal + packagingTotal };
}
const UNIT_LABEL = { g:'g', ml:'ml', unidades:'unidades' };
// Redondea cantidades de stock para mostrar prolijo (sin decimales largos por errores de coma flotante)
function fmtQty(n){
  const v = Math.round((n||0) * 100) / 100;
  return v % 1 === 0 ? v.toString() : v.toFixed(2).replace(/0+$/,'').replace(/\.$/,'');
}

function ingredientConsumptionForCostProduct(cp, multiplier){
  // Solo ingredientes DIRECTOS (los que no pasan por una receta) se descuentan como ingrediente crudo.
  const consumption = {}; // ingredientId -> qty consumida
  for(const it of (cp.directIngredients||[])){
    consumption[it.ingredientId] = (consumption[it.ingredientId]||0) + it.qty * multiplier;
  }
  return consumption;
}
function recipeConsumptionForCostProduct(cp, multiplier){
  // Las recetas usadas (mermelada, crema, etc.) se descuentan de SU PROPIO stock preparado.
  const consumption = {}; // recipeId -> qty consumida
  for(const it of (cp.recipesUsed||[])){
    consumption[it.recipeId] = (consumption[it.recipeId]||0) + it.qty * multiplier;
  }
  return consumption;
}
function packagingConsumptionForCostProduct(cp, multiplier){
  // Solo el packaging marcado como "se descuenta al producir" (ej: Pote) se descuenta acá.
  // El de tipo "venta" (bolsas) se descuenta al cargar la venta, y el de tipo
  // "ninguno" (sticker, tarjeta) nunca se descuenta automático.
  const consumption = {};
  for(const pid of (cp.packagingIds||[])){
    const pk = DATA.packagingCatalog.find(p=>p.id===pid);
    if(!pk || pk.consumptionType !== 'produccion') continue;
    consumption[pid] = (consumption[pid]||0) + multiplier;
  }
  return consumption;
}

function renderExpenseSummary(){

async function removeSale(id){
  if(!confirm('¿Eliminar esta venta? El stock se restituirá.')) return;
  const sale = DATA.sales.find(s=>s.id===id);
  if(!sale) return;
  try{
    for(const it of sale.items){
      if(it.productId){
        const p = DATA.products.find(p=>p.id===it.productId);
        if(p && p.trackStock) await sb.rpc('adjust_stock', {p_product_id: it.productId, p_delta: it.qty});
      }
    }
    if(sale.clientId){
      const qtySum = sale.items.reduce((a,it)=>a+it.qty,0);
      await sb.rpc('adjust_purchase_count', {p_client_id: sale.clientId, p_delta: -qtySum});
    }
    for(const b of (sale.bagsUsed||[])){
      if(b.packagingId) await sb.rpc('adjust_packaging_stock', {p_packaging_id: b.packagingId, p_delta: b.qty});
    }
    const { error } = await sb.from('sales').delete().eq('id', id);
    if(error) throw error;
    await loadAll();
    render();
  } catch(e){ alert('Error al eliminar la venta: ' + e.message); }
}

async function cancelWip(id){
  if(!confirm('¿Cancelar esta producción incompleta? Se va a restituir lo que ya se había descontado.')) return;
  const w = (DATA.workInProgress||[]).find(w=>w.id===id);
  if(!w) return;
  const p = DATA.products.find(p=>p.id===w.productId);
  const cp = p ? DATA.costProducts.find(cp=>cp.id===p.costProductId) : null;
  try{
    if(cp){
      await Promise.all((cp.directIngredients||[]).filter(it=>w.usedIngredientIds.includes(it.ingredientId)).map(it =>
        sb.rpc('adjust_ingredient_stock', { p_ingredient_id: it.ingredientId, p_delta: it.qty*w.qty })
      ));
      await Promise.all((cp.recipesUsed||[]).filter(it=>w.usedRecipeIds.includes(it.recipeId)).map(it =>
        sb.rpc('adjust_recipe_stock', { p_recipe_id: it.recipeId, p_delta: it.qty*w.qty })
      ));
    }
    const { error } = await sb.from('work_in_progress').delete().eq('id', id);
    if(error) throw error;
    await loadAll();
    render();
  } catch(e){
    alert('Error al cancelar: ' + e.message);
  }
}

function attachFinishWipModalEvents(w){
  document.getElementById('modal-cancel').onclick = closeModal;
  const p = DATA.products.find(p=>p.id===w.productId);
  const cp = p ? DATA.costProducts.find(cp=>cp.id===p.costProductId) : null;
  const btn = document.getElementById('wip-finish-save');
  if(!btn || !cp) return;
  const rMap = recipeMap(), iMap = ingredientMap();
  const qtyInput = document.getElementById('wip-finish-qty');

  const updatePreview = () => {
    const finishQty = Math.min(w.qty, Math.max(1, +qtyInput.value || 1));
    const pendingRecipes = (cp.recipesUsed||[]).filter(it => !w.usedRecipeIds.includes(it.recipeId));
    const pendingIngredients = (cp.directIngredients||[]).filter(it => !w.usedIngredientIds.includes(it.ingredientId));
    const recLines = pendingRecipes.map(it => {
      const r = rMap[it.recipeId]; if(!r) return '';
      const amt = it.qty*finishQty;
      const after = (r.currentStock||0) - amt;
      return `<div class="row" style="font-size:12.5px"><span class="row-label">Receta pendiente: ${esc(r.name)} (-${amt.toFixed(1)} ${UNIT_LABEL[r.yieldUnit]||r.yieldUnit})</span><span style="color:${after<0?COLORS.frutillaDark:'inherit'}">${after<0?'¡no alcanza!':'quedan '+after.toFixed(1)}</span></div>`;
    }).join('');
    const ingLines = pendingIngredients.map(it => {
      const ing = iMap[it.ingredientId]; if(!ing) return '';
      const amt = it.qty*finishQty;
      const after = (ing.currentStock||0) - amt;
      return `<div class="row" style="font-size:12.5px"><span class="row-label">Ingrediente pendiente: ${esc(ing.name)} (-${amt.toFixed(1)} ${UNIT_LABEL[ing.unit]})</span><span style="color:${after<0?COLORS.frutillaDark:'inherit'}">${after<0?'¡no alcanza!':'quedan '+after.toFixed(1)}</span></div>`;
    }).join('');
    const remaining = w.qty - finishQty;
    document.getElementById('wip-finish-preview').innerHTML = `
      <div style="font-size:12px;color:var(--chocoSoft);margin-bottom:6px">El pote ya se descontó cuando arrancó este lote, no se vuelve a descontar acá.</div>
      ${recLines || ingLines ? `<div class="field-label" style="margin-bottom:4px">Falta descontar (para ${finishQty} unidad${finishQty>1?'es':''}):</div>${recLines}${ingLines}` : `<div class="empty" style="padding:8px 0">No queda nada pendiente, solo falta sumar el stock final.</div>`}
      ${remaining>0 ? `<div style="font-size:12.5px;color:var(--chocoSoft);margin-top:8px">Van a quedar ${remaining} unidad${remaining>1?'es':''} todavía en preparación.</div>` : ''}
    `;
  };
  qtyInput.oninput = updatePreview;
  updatePreview();

  btn.onclick = async () => {
    const finishQty = Math.min(w.qty, Math.max(1, +qtyInput.value || 1));
    try{
      let warnings = [];
      await Promise.all((cp.directIngredients||[]).filter(it=>!w.usedIngredientIds.includes(it.ingredientId)).map(async it => {
        const ing = DATA.ingredients.find(i=>i.id===it.ingredientId); if(!ing) return;
        const { data: newStock, error } = await sb.rpc('adjust_ingredient_stock', { p_ingredient_id: it.ingredientId, p_delta: -(it.qty*finishQty) });
        if(error) throw error;
        if(ing.lowStockAlert>0 && newStock<=ing.lowStockAlert) warnings.push(ing.name);
      }));
      await Promise.all((cp.recipesUsed||[]).filter(it=>!w.usedRecipeIds.includes(it.recipeId)).map(async it => {
        const r = DATA.recipes.find(r=>r.id===it.recipeId); if(!r) return;
        const { data: newStock, error } = await sb.rpc('adjust_recipe_stock', { p_recipe_id: it.recipeId, p_delta: -(it.qty*finishQty) });
        if(error) throw error;
        if(r.lowStockAlert>0 && newStock<=r.lowStockAlert) warnings.push(r.name);
      }));
      // El pote (packaging tipo "producción") ya se descontó cuando se marcó
      // este lote como incompleto — no se vuelve a descontar al terminar.
      if(p){
        const { error } = await sb.rpc('adjust_stock', { p_product_id: w.productId, p_delta: finishQty });
        if(error) throw error;
      }
      const remaining = w.qty - finishQty;
      if(remaining > 0){
        const { error } = await sb.from('work_in_progress').update({ qty: remaining }).eq('id', w.id);
        if(error) throw error;
      } else {
        const { error } = await sb.from('work_in_progress').delete().eq('id', w.id);
        if(error) throw error;
      }
      await loadAll();
      closeModal();
      if(warnings.length) alert(`⚠ Ojo, quedaste con poco stock de: ${warnings.join(', ')}.`);
    } catch(e){
      alert('Error al terminar la producción: ' + e.message);
    }
  };
}

/* ===================== CLIENTES ===================== */
function renderClients(){
  const threshold = DATA.loyalty?.threshold || 10;
  const spentByClient = {};
  const lastPurchaseByClient = {};
  for(const s of DATA.sales){
    if(!s.clientId) continue;
    const total = s.items.reduce((a,it)=>a+it.price*it.qty,0);
    spentByClient[s.clientId] = (spentByClient[s.clientId]||0)+total;
    if(!lastPurchaseByClient[s.clientId] || s.date > lastPurchaseByClient[s.clientId]) lastPurchaseByClient[s.clientId] = s.date;
  }
  const sortedClients = [...DATA.clients].sort((a,b) => {
    const da = lastPurchaseByClient[a.id] || '';
    const db = lastPurchaseByClient[b.id] || '';
    return db.localeCompare(da);
  });

  return `
    <div class="header-row">
      <div><div class="header-title serif">Clientes</div><div class="header-sub">Fidelización activa: cada ${threshold} postres, ${esc(DATA.loyalty?.reward||'premio')}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" data-open-modal="loyalty">${ICONS.gift} Config. fidelidad</button>
        <button class="btn btn-primary" data-open-modal="newClient">${ICONS.plus} Nuevo cliente</button>
      </div>
    </div>
    ${DATA.clients.length===0 ? `<div class="card"><div class="empty">Todavía no cargaste clientes.</div></div>` : `
      <div class="grid-cards">
        ${sortedClients.map(c => {
          const count = c.purchaseCount || 0;
          const progress = Math.min(100, (count % threshold) / threshold * 100);
          const ready = count>0 && count % threshold === 0;
          const nextGoal = ready ? count : (Math.floor(count / threshold) + 1) * threshold;
          return `
            <div class="card">
              <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div>
                  <div style="font-weight:700;font-size:16px">${esc(c.name)}</div>
                  ${c.phone ? `<div style="font-size:12.5px;color:var(--chocoSoft)">${esc(c.phone)}</div>` : ''}
                </div>
                <div style="display:flex;gap:4px">
                  <button class="btn-icon" data-edit-client="${c.id}">${ICONS.edit.replace('currentColor', COLORS.chocoSoft)}</button>
                  <button class="btn-icon" data-remove-client="${c.id}">${ICONS.trash.replace('currentColor', COLORS.frutillaDark)}</button>
                </div>
              </div>
              <div class="num" style="margin-top:10px;font-size:13.5px">
                <div class="row"><span class="row-label">Postres comprados</span><span class="row-value">${count}</span></div>
                <div class="row"><span class="row-label">Gastado en total</span><span class="row-value bold">${money(spentByClient[c.id]||0)}</span></div>
              </div>
              <div style="margin-top:10px">
                <div style="height:7px;background:var(--line);border-radius:999px;overflow:hidden">
                  <div style="height:100%;width:${progress}%;background:${ready?COLORS.menta:COLORS.dulce}"></div>
                </div>
                <div style="font-size:12px;color:var(--chocoSoft);margin-top:4px">Meta actual: ${nextGoal} postres ${ready ? `— 🎁 ¡Le corresponde: ${esc(DATA.loyalty?.reward)}!` : `(${count}/${nextGoal})`}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `}
  `;
}

    if(!r || !batches){ preview.innerHTML = ''; return; }
    const iMap = ingredientMap();
    const lines = (r.items||[]).map(it => {
      const ing = iMap[it.ingredientId];
      if(!ing) return '';
      const amt = it.qty * batches;
      const after = (ing.currentStock||0) - amt;
      const warn = after < 0;
      return `<div class="row" style="font-size:12.5px"><span class="row-label">${esc(ing.name)} (se descuentan ${amt.toFixed(1)} ${UNIT_LABEL[ing.unit]})</span><span style="color:${warn?COLORS.frutillaDark:'inherit'}">quedan ${after.toFixed(1)}</span></div>`;
    }).join('');
    const producedQty = (r.yieldQty||0) * batches;
    preview.innerHTML = `<div class="field-label" style="margin:8px 0 4px">Va a sumar ${producedQty} ${UNIT_LABEL[r.yieldUnit]||r.yieldUnit} de stock de "${esc(r.name)}", descontando:</div>${lines}`;
  };
  document.getElementById('rsm-recipe').onchange = updatePreview;
  document.getElementById('rsm-batches').oninput = updatePreview;
  document.getElementById('rsm-save').onclick = async () => {
    const recipeId = document.getElementById('rsm-recipe').value;
    const batches = +document.getElementById('rsm-batches').value || 0;
    if(!recipeId){ alert('Elegí una receta.'); return; }
    if(!batches || batches<=0){ alert('Poné una cantidad válida de lotes.'); return; }
    const r = DATA.recipes.find(r=>r.id===recipeId);
    if(!r) return;
    try{
      let warnings = [];
      await Promise.all((r.items||[]).map(async it => {
        const ing = DATA.ingredients.find(i=>i.id===it.ingredientId);
        if(!ing) return;
        const { data: newStock, error } = await sb.rpc('adjust_ingredient_stock', { p_ingredient_id: it.ingredientId, p_delta: -(it.qty*batches) });
        if(error) throw error;
        if(ing.lowStockAlert>0 && newStock<=ing.lowStockAlert) warnings.push(ing.name);
      }));
      const { error: recErr } = await sb.rpc('adjust_recipe_stock', { p_recipe_id: recipeId, p_delta: (r.yieldQty||0)*batches });
      if(recErr) throw recErr;
      await loadAll();
      closeModal();
      if(warnings.length) alert(`⚠ Ojo, quedaste con poco stock de: ${warnings.join(', ')}.`);
    } catch(e){
      alert('Error al guardar: ' + e.message);
    }
  };
}
async function removeRecipe(id){
  const usedInProducts = DATA.costProducts.filter(cp => (cp.recipesUsed||[]).some(it=>it.recipeId===id));
  if(usedInProducts.length && !confirm(`Esta receta se usa en ${usedInProducts.length} postre(s). Si la borrás, esos costos van a dejar de sumarla. ¿Continuar?`)) return;

  let host = document.getElementById('modal-host');
  if(!host){ host = document.createElement('div'); host.id = 'modal-host'; document.body.appendChild(host); }
  if(!MODAL){ host.innerHTML=''; return; }

  let inner = '';
  if(MODAL.type==='newSale') inner = saleModalHtml();
  if(MODAL.type==='newProduct') inner = productModalHtml(MODAL.payload);
  if(MODAL.type==='newClient') inner = clientModalHtml(MODAL.payload);

  if(MODAL.type==='loyalty') inner = loyaltyModalHtml();

  if(MODAL.type==='finishWip') inner = finishWipModalHtml(MODAL.payload);

  host.innerHTML = `<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-box" style="${wide?'width:560px':''}">${inner}</div></div>`;
  document.getElementById('modal-overlay').onclick = (e) => { if(e.target.id==='modal-overlay') closeModal(); };

  const cancelBtn = document.getElementById('modal-cancel'); if(cancelBtn) cancelBtn.onclick = closeModal;

  if(MODAL.type==='newSale') attachSaleModalEvents();

  document.getElementById('sale-client').value = client;
  document.getElementById('sale-date').value = date;
  document.getElementById('sale-payment').value = payment;

async function saveSale(){
  if(SAVING) return;
  const clientName = document.getElementById('sale-client').value.trim();
  const date = document.getElementById('sale-date').value || todayISO();
  const paymentMethod = document.getElementById('sale-payment').value;
  const discountInput = +document.getElementById('sale-discount').value || 0;
  const computed = SALE_ITEMS.map(it => { const p = DATA.products.find(p=>p.id===it.productId); return {...it, product:p, price:p?p.price:0, cost:p?p.cost:0}; });
  const valid = computed.filter(it => it.productId && it.qty>0);
  if(!valid.length){ alert('Sumá al menos un producto.'); return; }
  const insufficient = valid.some(it=>it.product && it.product.trackStock && it.qty>it.product.stock);
  if(insufficient){ alert('No hay stock suficiente para completar esta venta.'); return; }

  const totalRevenue = valid.reduce((a,it)=>a+it.price*it.qty,0);
  const discount = Math.min(discountInput, totalRevenue);
  const items = valid.map(it => {
    const itemRevenue = it.price * it.qty;
    const share = totalRevenue > 0 ? (itemRevenue / totalRevenue) * discount : 0;
    const effectivePrice = it.qty > 0 ? (itemRevenue - share) / it.qty : it.price;
    return { productId: it.productId, productName: it.product.name, ownerId: it.product.ownerId, qty: it.qty, price: effectivePrice, cost: it.cost };
  });

  SAVING = true;
  const saveBtn = document.getElementById('sale-save');
  if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Guardando...'; }

  let rewardMsg = null;
  try{
    let clientId = null;
    const qtySum = valid.reduce((a,it)=>a+it.qty,0);
    if(clientName){
      const existing = DATA.clients.find(c => c.name.trim().toLowerCase() === clientName.toLowerCase());
      const threshold = DATA.loyalty?.threshold || 10;
      if(!existing){
        const { data, error } = await sb.from('clients').insert({ name: clientName, phone: '', purchase_count: qtySum }).select().single();
        if(error) throw error;
        clientId = data.id;
        const afterMultiples = Math.floor(qtySum / threshold);
        if(afterMultiples > 0){
          const nextGoal = (afterMultiples + 1) * threshold;
          rewardMsg = `🎁 ¡${clientName} llegó a ${qtySum} postres comprados! Le corresponde: ${DATA.loyalty?.reward || 'un premio'}. Próxima meta: ${nextGoal}.`;
        }
      } else {
        clientId = existing.id;
        const before = existing.purchaseCount || 0;
        const { data: newCount, error } = await sb.rpc('adjust_purchase_count', { p_client_id: existing.id, p_delta: qtySum });
        if(error) throw error;
        const beforeMultiples = Math.floor(before / threshold);
        const afterMultiples = Math.floor(newCount / threshold);
        if(afterMultiples > beforeMultiples){
          const nextGoal = (afterMultiples + 1) * threshold;
          rewardMsg = `🎁 ¡${clientName} llegó a ${newCount} postres comprados! Le corresponde: ${DATA.loyalty?.reward || 'un premio'}. Próxima meta: ${nextGoal}.`;
        }
      }
    }

    const { data: saleRow, error: saleErr } = await sb.from('sales').insert({ date, client_id: clientId, payment_method: paymentMethod, discount }).select().single();
    if(saleErr) throw saleErr;

    const itemRows = items.map(it => ({ sale_id: saleRow.id, product_id: it.productId, product_name: it.productName, owner_id: it.ownerId, qty: it.qty, cost: it.cost, price: it.price }));
    const { error: itemsErr } = await sb.from('sale_items').insert(itemRows);
    if(itemsErr) throw itemsErr;

    for(const it of valid){
      if(it.product.trackStock){
        await sb.rpc('adjust_stock', { p_product_id: it.productId, p_delta: -it.qty });
      }
    }

    const validBags = SALE_BAGS.filter(b => b.packagingId && b.qty>0);
    if(validBags.length){
      const bagRows = validBags.map(b => ({ sale_id: saleRow.id, packaging_id: b.packagingId, qty: b.qty }));
      const { error: bagsErr } = await sb.from('sale_bags').insert(bagRows);
      if(bagsErr) throw bagsErr;
      for(const b of validBags){
        await sb.rpc('adjust_packaging_stock', { p_packaging_id: b.packagingId, p_delta: -b.qty });
      }
    }

    await loadAll();
    closeModal();
    if(rewardMsg) alert(rewardMsg);
  } catch(e){
    alert('Error al guardar la venta: ' + e.message);
  } finally {
    SAVING = false;
  }
}

  const name = document.getElementById('rec-name').value.trim();
  const yieldQty = +document.getElementById('rec-yield').value || 0;
  const yieldUnit = document.getElementById('rec-yield-unit').value;
  const lowStockAlert = +document.getElementById('rec-lowstock').value || 0;
  const items = RECIPE_ITEMS.filter(it => it.ingredientId && it.qty>0);
  if(!name){ alert('Poné un nombre.'); return; }
  if(!items.length){ alert('Agregá al menos un ingrediente.'); return; }
  if(!yieldQty){ alert('Indicá el rendimiento total.'); return; }
  try{
    let recipeId;
    if(editing){
      const { error } = await sb.from('recipes').update({ name, yield_qty: yieldQty, yield_unit: yieldUnit, low_stock_alert: lowStockAlert }).eq('id', editing.id);
      if(error) throw error;
      recipeId = editing.id;
      const { error: delErr } = await sb.from('recipe_items').delete().eq('recipe_id', recipeId);
      if(delErr) throw delErr;
    } else {
      const { data, error } = await sb.from('recipes').insert({ name, yield_qty: yieldQty, yield_unit: yieldUnit, low_stock_alert: lowStockAlert }).select().single();
      if(error) throw error;
      recipeId = data.id;
    }
    const rows = items.map(it => ({ recipe_id: recipeId, ingredient_id: it.ingredientId, qty: it.qty }));
    const { error: itemsErr } = await sb.from('recipe_items').insert(rows);
    if(itemsErr) throw itemsErr;
    await loadAll();
    closeModal();
  } catch(e){
    alert('Error al guardar la receta: ' + e.message);
  }
}

/* ---- Costeo de un postre (ingredientes directos + recetas + packaging) ---- */
let CP_DIRECT = [];
let CP_RECIPES = [];
let CP_PACKAGING = [];
function costProductModalHtml(editing){
  CP_DIRECT = editing ? structuredClone(editing.directIngredients||[]) : [];
  CP_RECIPES = editing ? structuredClone(editing.recipesUsed||[]) : [];
  CP_PACKAGING = editing ? structuredClone(editing.packagingIds||[]) : [];
  return renderCostProductModalBody(editing);
}
function renderCostProductModalBody(editing){
  const iMap = ingredientMap(), rMap = recipeMap();
  const directTotal = CP_DIRECT.reduce((a,it) => { const ing=iMap[it.ingredientId]; return a + (ing?ingredientCostPerUnit(ing)*it.qty:0); }, 0);
  const recipesTotal = CP_RECIPES.reduce((a,it) => { const r=rMap[it.recipeId]; return a + (r?recipeCostPerUnit(r)*it.qty:0); }, 0);
  const packagingTotal = CP_PACKAGING.reduce((a,pid) => { const p = DATA.packagingCatalog.find(p=>p.id===pid); return a + (p?p.cost:0); }, 0);
  const total = directTotal + recipesTotal + packagingTotal;

  return `
    ${modalHeader(editing?'Editar postre (costeo)':'Nuevo postre (costeo)')}
    <div class="field"><div class="field-label">Nombre del postre</div><input class="input" id="cp-name" value="${esc(editing?.name||'')}" placeholder="Ej: Cheesecake"/></div>

    <div class="field-label" style="margin:14px 0 6px">Ingredientes directos</div>
    <div id="cp-direct-items">
      ${CP_DIRECT.map((row,i) => `
        <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
          <select class="input cp-direct-ing" data-idx="${i}" style="flex:2;min-width:140px">
            <option value="">Elegir ingrediente...</option>
            ${DATA.ingredients.map(ing=>`<option value="${ing.id}" ${ing.id===row.ingredientId?'selected':''}>${esc(ing.name)}</option>`).join('')}
          </select>
          <input type="number" min="0" step="any" class="input cp-direct-qty" data-idx="${i}" value="${row.qty}" style="width:80px" placeholder="cant."/>
          <span style="font-size:12px;color:var(--chocoSoft);width:34px">${iMap[row.ingredientId]?UNIT_LABEL[iMap[row.ingredientId].unit]:''}</span>
          <button class="btn-icon cp-direct-remove" data-idx="${i}">${ICONS.trash.replace('currentColor', COLORS.frutillaDark)}</button>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-ghost" id="cp-add-direct" style="margin-bottom:14px" ${DATA.ingredients.length===0?'disabled':''}>${ICONS.plus} Agregar ingrediente</button>

    <div class="field-label" style="margin:14px 0 6px">Recetas usadas</div>
    <div id="cp-recipe-items">
      ${CP_RECIPES.map((row,i) => {
        const r = rMap[row.recipeId];
        return `
        <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
          <select class="input cp-recipe-sel" data-idx="${i}" style="flex:2;min-width:140px">
            <option value="">Elegir receta...</option>
            ${DATA.recipes.map(rr=>`<option value="${rr.id}" ${rr.id===row.recipeId?'selected':''}>${esc(rr.name)}</option>`).join('')}
          </select>
          <input type="number" min="0" step="any" class="input cp-recipe-qty" data-idx="${i}" value="${row.qty}" style="width:80px" placeholder="cant."/>
          <span style="font-size:12px;color:var(--chocoSoft);width:60px">${r?UNIT_LABEL[r.yieldUnit]||r.yieldUnit:''}</span>
          <button class="btn-icon cp-recipe-remove" data-idx="${i}">${ICONS.trash.replace('currentColor', COLORS.frutillaDark)}</button>
        </div>
      `; }).join('')}
    </div>
    <button class="btn btn-ghost" id="cp-add-recipe" style="margin-bottom:14px" ${DATA.recipes.length===0?'disabled':''}>${ICONS.plus} Agregar receta</button>

    <div class="field-label" style="margin:14px 0 6px">Packaging</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      ${DATA.packagingCatalog.length===0 ? `<div class="empty" style="padding:0">Cargá packaging primero en la sección de Costeo.</div>` :
        DATA.packagingCatalog.map(p => `
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;border:1px solid var(--line);padding:6px 10px;border-radius:8px">
            <input type="checkbox" class="cp-packaging-check" value="${p.id}" ${CP_PACKAGING.includes(p.id)?'checked':''}/> ${esc(p.name)} <span class="num" style="color:var(--chocoSoft)">(${money(p.cost)})</span>
          </label>
        `).join('')
      }
    </div>

    <div class="card" style="background:var(--cream);border:none">
      <div class="num row" style="font-size:14px"><span class="row-label">Ingredientes directos</span><span>${money(directTotal)}</span></div>
      <div class="num row" style="font-size:14px"><span class="row-label">Recetas</span><span>${money(recipesTotal)}</span></div>
      <div class="num row" style="font-size:14px"><span class="row-label">Packaging</span><span>${money(packagingTotal)}</span></div>
      <div class="num row" style="font-size:16px;font-weight:800;color:${COLORS.menta}"><span>Costo total del postre</span><span>${money(total)}</span></div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:18px">
      <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
      <button class="btn btn-primary" id="cp-save">Guardar</button>

function attachCostProductModalEvents(editing){
  document.getElementById('modal-cancel').onclick = closeModal;
  document.getElementById('cp-add-direct').onclick = () => { CP_DIRECT.push({ingredientId:'', qty:1}); refreshCostProductModal(editing); };
  document.getElementById('cp-add-recipe').onclick = () => { CP_RECIPES.push({recipeId:'', qty:1}); refreshCostProductModal(editing); };
  document.querySelectorAll('.cp-direct-ing').forEach(el => el.onchange = () => { CP_DIRECT[+el.dataset.idx].ingredientId = el.value; refreshCostProductModal(editing); });
  document.querySelectorAll('.cp-direct-qty').forEach(el => el.onchange = () => { CP_DIRECT[+el.dataset.idx].qty = +el.value || 0; refreshCostProductModal(editing); });
  document.querySelectorAll('.cp-direct-remove').forEach(el => el.onclick = () => { CP_DIRECT.splice(+el.dataset.idx,1); refreshCostProductModal(editing); });
  document.querySelectorAll('.cp-recipe-sel').forEach(el => el.onchange = () => { CP_RECIPES[+el.dataset.idx].recipeId = el.value; refreshCostProductModal(editing); });
  document.querySelectorAll('.cp-recipe-qty').forEach(el => el.onchange = () => { CP_RECIPES[+el.dataset.idx].qty = +el.value || 0; refreshCostProductModal(editing); });
  document.querySelectorAll('.cp-recipe-remove').forEach(el => el.onclick = () => { CP_RECIPES.splice(+el.dataset.idx,1); refreshCostProductModal(editing); });
  document.querySelectorAll('.cp-packaging-check').forEach(el => el.onchange = () => {
    CP_PACKAGING = Array.from(document.querySelectorAll('.cp-packaging-check:checked')).map(c=>c.value);
    refreshCostProductModal(editing);
  });
  document.getElementById('cp-save').onclick = () => saveCostProduct(editing);
}
function refreshCostProductModal(editing){
  const name = document.getElementById('cp-name')?.value || '';
  document.getElementById('modal-box').innerHTML = renderCostProductModalBody(editing);
  const closeBtn = document.getElementById('modal-close'); if(closeBtn) closeBtn.onclick = closeModal;
  document.getElementById('cp-name').value = name;
  attachCostProductModalEvents(editing);
}
async function saveCostProduct(editing){
  const name = document.getElementById('cp-name').value.trim();
  if(!name){ alert('Poné un nombre.'); return; }
  const directIngredients = CP_DIRECT.filter(it => it.ingredientId && it.qty>0);
  const recipesUsed = CP_RECIPES.filter(it => it.recipeId && it.qty>0);
  const packagingIds = CP_PACKAGING;
  try{
    let cpId;
    if(editing){
      const { error } = await sb.from('cost_products').update({ name }).eq('id', editing.id);
      if(error) throw error;
      cpId = editing.id;
      await Promise.all([
        sb.from('cost_product_ingredients').delete().eq('cost_product_id', cpId),
        sb.from('cost_product_recipes').delete().eq('cost_product_id', cpId),
        sb.from('cost_product_packaging').delete().eq('cost_product_id', cpId),
      ]);
    } else {
      const { data, error } = await sb.from('cost_products').insert({ name }).select().single();
      if(error) throw error;
      cpId = data.id;
    }
    const inserts = [];
    if(directIngredients.length) inserts.push(sb.from('cost_product_ingredients').insert(directIngredients.map(it => ({ cost_product_id: cpId, ingredient_id: it.ingredientId, qty: it.qty }))));
    if(recipesUsed.length) inserts.push(sb.from('cost_product_recipes').insert(recipesUsed.map(it => ({ cost_product_id: cpId, recipe_id: it.recipeId, qty: it.qty }))));
    if(packagingIds.length) inserts.push(sb.from('cost_product_packaging').insert(packagingIds.map(pid => ({ cost_product_id: cpId, packaging_id: pid }))));
    const results = await Promise.all(inserts);
    const failed = results.find(r => r.error);
    if(failed) throw failed.error;
    await loadAll();
    closeModal();
  } catch(e){
    alert('Error al guardar el costeo: ' + e.message);
  }
}

/* ---- Movimiento de stock (producir / merma) ---- */
function stockMovementModalHtml(){
  const options = DATA.products.map(p=>`<option value="${p.id}">${esc(p.name)}${p.costProductId?' (vinculado a costeo)':''}</option>`).join('');
  return `
    ${modalHeader('Cargar movimiento de stock')}
    <div class="field"><div class="field-label">Postre</div>
      <select class="input" id="sm-product"><option value="">Elegir postre...</option>${options}</select>
    </div>
    <div class="field"><div class="field-label">Tipo de movimiento</div>
      <select class="input" id="sm-type">
        <option value="produccion">Hizo postres nuevos y terminados (suma stock)</option>
        <option value="incompleto">Empezó a hacerlos pero quedaron incompletos (no suma stock todavía)</option>
        <option value="merma">Se comió / rompió / merma (resta stock, sin afectar ingredientes)</option>
      </select>
    </div>
    <div class="field"><div class="field-label">Cantidad</div><input type="number" min="1" class="input" id="sm-qty" value="1"/></div>
    <div id="sm-components"></div>
    <div id="sm-preview" style="font-size:13px;color:var(--chocoSoft)"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:18px">
      <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
      <button class="btn btn-primary" id="sm-save">Guardar</button>
    </div>
  `;
}
function attachStockMovementModalEvents(){
  document.getElementById('modal-cancel').onclick = closeModal;

  const getCostProduct = () => {
    const p = DATA.products.find(p=>p.id===document.getElementById('sm-product').value);
    if(!p || !p.costProductId) return null;
    return DATA.costProducts.find(cp=>cp.id===p.costProductId) || null;
  };

  const renderComponentsChecklist = () => {
    const type = document.getElementById('sm-type').value;
    const box = document.getElementById('sm-components');
    if(type !== 'incompleto'){ box.innerHTML = ''; return; }
    const cp = getCostProduct();
    if(!cp){ box.innerHTML = `<div class="empty" style="padding:8px 0">Este postre no está vinculado a una receta de costeo, así que no hay componentes para marcar. Elegí "producción" normal.</div>`; return; }
    const rMap = recipeMap(), iMap = ingredientMap();
    const recRows = (cp.recipesUsed||[]).map(it => {
      const r = rMap[it.recipeId]; if(!r) return '';
      return `<label style="display:flex;align-items:center;gap:8px;font-size:13.5px;padding:4px 0"><input type="checkbox" class="sm-comp-recipe" value="${it.recipeId}"/> Ya usó: ${esc(r.name)}</label>`;
    }).join('');
    const dirRows = (cp.directIngredients||[]).map(it => {
      const ing = iMap[it.ingredientId]; if(!ing) return '';
      return `<label style="display:flex;align-items:center;gap:8px;font-size:13.5px;padding:4px 0"><input type="checkbox" class="sm-comp-ing" value="${it.ingredientId}"/> Ya usó: ${esc(ing.name)}</label>`;
    }).join('');
    box.innerHTML = `
      <div class="field-label" style="margin:10px 0 4px">Marcá lo que YA usó en este lote incompleto (lo que falta lo cargás después con "Terminar")</div>
      ${recRows}${dirRows}
      ${(!recRows && !dirRows) ? `<div class="empty" style="padding:8px 0">Esta receta de costeo no tiene ingredientes ni recetas cargadas.</div>` : ''}
    `;
    box.querySelectorAll('input').forEach(el => el.onchange = updatePreview);
  };

  const updatePreview = () => {
    const productId = document.getElementById('sm-product').value;
    const type = document.getElementById('sm-type').value;
    const qty = +document.getElementById('sm-qty').value || 0;
    const preview = document.getElementById('sm-preview');
    const p = DATA.products.find(p=>p.id===productId);
    if(!p || type==='merma' || !p.costProductId){ preview.innerHTML = ''; return; }
    const cp = DATA.costProducts.find(cp=>cp.id===p.costProductId);
    if(!cp){ preview.innerHTML = ''; return; }
    const iMap = ingredientMap();

    let ingConsumption, recConsumption, pkgConsumption = {};
    if(type==='incompleto'){
      const checkedRecipeIds = Array.from(document.querySelectorAll('.sm-comp-recipe:checked')).map(c=>c.value);
      const checkedIngIds = Array.from(document.querySelectorAll('.sm-comp-ing:checked')).map(c=>c.value);
      ingConsumption = {};
      for(const it of (cp.directIngredients||[])){ if(checkedIngIds.includes(it.ingredientId)) ingConsumption[it.ingredientId] = (ingConsumption[it.ingredientId]||0) + it.qty*qty; }
      recConsumption = {};
      for(const it of (cp.recipesUsed||[])){ if(checkedRecipeIds.includes(it.recipeId)) recConsumption[it.recipeId] = (recConsumption[it.recipeId]||0) + it.qty*qty; }
    } else {
      ingConsumption = ingredientConsumptionForCostProduct(cp, qty);
      recConsumption = recipeConsumptionForCostProduct(cp, qty);
      pkgConsumption = packagingConsumptionForCostProduct(cp, qty);
    }

    const ingLines = Object.entries(ingConsumption).map(([ingId, amt]) => {
      const ing = iMap[ingId]; if(!ing) return '';
      const after = (ing.currentStock||0) - amt;
      return `<div class="row" style="font-size:12.5px"><span class="row-label">Ingrediente: ${esc(ing.name)} (-${amt.toFixed(1)} ${UNIT_LABEL[ing.unit]})</span><span style="color:${after<0?COLORS.frutillaDark:'inherit'}">quedan ${after.toFixed(1)}</span></div>`;
    }).join('');
    const recLines = Object.entries(recConsumption).map(([recId, amt]) => {
      const r = DATA.recipes.find(r=>r.id===recId); if(!r) return '';
      const after = (r.currentStock||0) - amt;
      return `<div class="row" style="font-size:12.5px"><span class="row-label">Receta: ${esc(r.name)} (-${amt.toFixed(1)} ${UNIT_LABEL[r.yieldUnit]||r.yieldUnit})</span><span style="color:${after<0?COLORS.frutillaDark:'inherit'}">${after<0?'¡no alcanza, faltan '+Math.abs(after).toFixed(1)+'!':'quedan '+after.toFixed(1)}</span></div>`;
    }).join('');
    const pkgLines = Object.entries(pkgConsumption).map(([pid, amt]) => {
      const pk = DATA.packagingCatalog.find(pk=>pk.id===pid); if(!pk) return '';
      const after = (pk.currentStock||0) - amt;
      return `<div class="row" style="font-size:12.5px"><span class="row-label">Packaging: ${esc(pk.name)} (-${amt})</span><span style="color:${after<0?COLORS.frutillaDark:'inherit'}">quedan ${after}</span></div>`;
    }).join('');
    preview.innerHTML = (ingLines||recLines||pkgLines) ? `<div class="field-label" style="margin-bottom:4px">Se va a descontar:</div>${recLines}${ingLines}${pkgLines}` : '';
  };

  document.getElementById('sm-product').onchange = () => { renderComponentsChecklist(); updatePreview(); };
  document.getElementById('sm-type').onchange = () => { renderComponentsChecklist(); updatePreview(); };
  document.getElementById('sm-qty').oninput = updatePreview;
  renderComponentsChecklist();
  updatePreview();

  document.getElementById('sm-save').onclick = async () => {
    const productId = document.getElementById('sm-product').value;
    const type = document.getElementById('sm-type').value;
    const qty = +document.getElementById('sm-qty').value || 0;
    if(!productId){ alert('Elegí un postre.'); return; }
    if(!qty || qty<=0){ alert('Poné una cantidad válida.'); return; }
    const p = DATA.products.find(p=>p.id===productId);
    if(!p) return;

    if(type==='incompleto'){
      const cp = getCostProduct();
      if(!cp){ alert('Este postre no está vinculado a una receta de costeo.'); return; }
      const checkedRecipeIds = Array.from(document.querySelectorAll('.sm-comp-recipe:checked')).map(c=>c.value);
      const checkedIngIds = Array.from(document.querySelectorAll('.sm-comp-ing:checked')).map(c=>c.value);
      try{
        let warnings = [];
        await Promise.all((cp.directIngredients||[]).filter(it=>checkedIngIds.includes(it.ingredientId)).map(async it => {
          const ing = DATA.ingredients.find(i=>i.id===it.ingredientId); if(!ing) return;
          const { data: newStock, error } = await sb.rpc('adjust_ingredient_stock', { p_ingredient_id: it.ingredientId, p_delta: -(it.qty*qty) });
          if(error) throw error;
          if(ing.lowStockAlert>0 && newStock<=ing.lowStockAlert) warnings.push(ing.name);
        }));
        await Promise.all((cp.recipesUsed||[]).filter(it=>checkedRecipeIds.includes(it.recipeId)).map(async it => {
          const r = DATA.recipes.find(r=>r.id===it.recipeId); if(!r) return;
          const { data: newStock, error } = await sb.rpc('adjust_recipe_stock', { p_recipe_id: it.recipeId, p_delta: -(it.qty*qty) });
          if(error) throw error;
          if(r.lowStockAlert>0 && newStock<=r.lowStockAlert) warnings.push(r.name);
        }));
        // El packaging tipo "producción" (el pote) se descuenta ya, apenas arranca
        // el lote, sea completo o incompleto — un pote por postre en preparación.
        const pkgConsumption = packagingConsumptionForCostProduct(cp, qty);
        await Promise.all(Object.entries(pkgConsumption).map(async ([pid, amt]) => {
          const pk = DATA.packagingCatalog.find(pk=>pk.id===pid); if(!pk) return;
          const { data: newStock, error } = await sb.rpc('adjust_packaging_stock', { p_packaging_id: pid, p_delta: -amt });
          if(error) throw error;
          if(pk.lowStockAlert>0 && newStock<=pk.lowStockAlert) warnings.push(pk.name);
        }));
        const { error: wipErr } = await sb.from('work_in_progress').insert({ product_id: productId, qty, date: todayISO(), used_ingredient_ids: checkedIngIds, used_recipe_ids: checkedRecipeIds });
        if(wipErr) throw wipErr;
        await loadAll();
        closeModal();
        if(warnings.length) alert(`⚠ Ojo, quedaste con poco stock de: ${warnings.join(', ')}.`);
      } catch(e){
        alert('Error al guardar: ' + e.message);
      }
      return;
    }

    let insufficientRecipes = [];
    if(type==='produccion' && p.costProductId){
      const cp0 = DATA.costProducts.find(cp=>cp.id===p.costProductId);
      if(cp0){
        const recConsumption0 = recipeConsumptionForCostProduct(cp0, qty);
        for(const [recId, amt] of Object.entries(recConsumption0)){
          const r = DATA.recipes.find(r=>r.id===recId);
          if(r && (r.currentStock||0) < amt) insufficientRecipes.push(`${r.name} (faltan ${(amt-(r.currentStock||0)).toFixed(1)} ${UNIT_LABEL[r.yieldUnit]||r.yieldUnit})`);
        }
      }
    }
    if(insufficientRecipes.length){
      if(!confirm(`No hay suficiente stock preparado de: ${insufficientRecipes.join(', ')}. ¿Producir igual? (el stock de esa receta va a quedar en negativo)`)) return;
    }

    try{
      if(type==='produccion'){
        const { error } = await sb.rpc('adjust_stock', { p_product_id: productId, p_delta: qty });
        if(error) throw error;
        let warnings = [];
        if(p.costProductId){
          const cp = DATA.costProducts.find(cp=>cp.id===p.costProductId);
          if(cp){
            const ingConsumption = ingredientConsumptionForCostProduct(cp, qty);
            await Promise.all(Object.entries(ingConsumption).map(async ([ingId, amt]) => {
              const ing = DATA.ingredients.find(i=>i.id===ingId); if(!ing) return;
              const { data: newStock, error: e2 } = await sb.rpc('adjust_ingredient_stock', { p_ingredient_id: ingId, p_delta: -amt });
              if(e2) throw e2;
              if(ing.lowStockAlert>0 && newStock<=ing.lowStockAlert) warnings.push(ing.name);
            }));
            const recConsumption = recipeConsumptionForCostProduct(cp, qty);
            await Promise.all(Object.entries(recConsumption).map(async ([recId, amt]) => {
              const r = DATA.recipes.find(r=>r.id===recId); if(!r) return;
              const { data: newStock, error: e2 } = await sb.rpc('adjust_recipe_stock', { p_recipe_id: recId, p_delta: -amt });
              if(e2) throw e2;
              if(r.lowStockAlert>0 && newStock<=r.lowStockAlert) warnings.push(r.name);
            }));
            const pkgConsumption = packagingConsumptionForCostProduct(cp, qty);
            await Promise.all(Object.entries(pkgConsumption).map(async ([pid, amt]) => {
              const pk = DATA.packagingCatalog.find(pk=>pk.id===pid); if(!pk) return;
              const { data: newStock, error: e2 } = await sb.rpc('adjust_packaging_stock', { p_packaging_id: pid, p_delta: -amt });
              if(e2) throw e2;
              if(pk.lowStockAlert>0 && newStock<=pk.lowStockAlert) warnings.push(pk.name);
            }));
          }
        }
        await loadAll();
        closeModal();
        if(warnings.length) alert(`⚠ Ojo, quedaste con poco stock de: ${warnings.join(', ')}.`);
      } else {
        const { error } = await sb.rpc('adjust_stock', { p_product_id: productId, p_delta: -qty });
        if(error) throw error;
        await loadAll();
        closeModal();
      }
    } catch(e){
      alert('Error al guardar el movimiento: ' + e.message);
    }
  };
}

/* ===================== LISTA DE COMPRAS ===================== */
function renderShopping(){
  const lowIngredients = DATA.ingredients.filter(i=>i.lowStockAlert>0 && (i.currentStock||0)<=i.lowStockAlert);
  const manualItems = DATA.shoppingListManual || [];

  return `
    <div class="header-row">
      <div><div class="header-title serif">Lista de compras</div><div class="header-sub">Lo que queda poco se agrega solo, y también podés anotar otras cosas a mano</div></div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;font-weight:700;margin-bottom:10px">${ICONS.alert.replace('currentColor', COLORS.frutillaDark)} <span style="color:${COLORS.frutillaDark}">Ingredientes con poco stock</span></div>
      ${lowIngredients.length===0 ? `<div class="empty" style="padding:8px 0">Por ahora no hay ningún ingrediente bajo — todo en orden.</div>` :
        lowIngredients.map(ing => `
          <div class="row" style="font-size:14px;align-items:center;flex-wrap:wrap;gap:6px">
            <span class="row-label">${esc(ing.name)} <span class="num" style="color:${COLORS.frutillaDark}">— quedan ${fmtQty(ing.currentStock)} ${UNIT_LABEL[ing.unit]} (aviso en ${ing.lowStockAlert})</span></span>
            <button class="btn btn-ghost" data-quick-purchase-ingredient="${ing.id}" style="padding:5px 10px;font-size:12.5px">${ICONS.plus} Ya compré</button>
          </div>
        `).join('')
      }
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="serif" style="font-weight:700;font-size:16px">Otras cosas para comprar</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <input class="input" id="shop-new-item" placeholder="Ej: Etiquetas, cinta para embalar..." style="flex:1;min-width:180px"/>
        <button class="btn btn-primary" id="shop-add-item">${ICONS.plus} Agregar</button>
      </div>
      ${manualItems.length===0 ? `<div class="empty" style="padding:8px 0">No hay nada anotado todavía.</div>` :
        manualItems.map(item => `
          <div class="row" style="font-size:14px;align-items:center">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;${item.checked?'opacity:0.5;text-decoration:line-through':''}">
              <input type="checkbox" class="shop-item-check" data-id="${item.id}" ${item.checked?'checked':''}/>
              <span>${esc(item.name)}</span>
            </label>
            <button class="btn-icon" data-remove-shop-item="${item.id}">${ICONS.trash.replace('currentColor', COLORS.frutillaDark)}</button>
          </div>
        `).join('')
      }
    </div>
  `;
}
function attachShoppingEvents(){
  const addBtn = document.getElementById('shop-add-item');
  if(addBtn){
    const input = document.getElementById('shop-new-item');
    const addItem = async () => {
      const name = input.value.trim();
      if(!name) return;
      const { error } = await sb.from('shopping_list_manual').insert({ name, checked: false });
      if(error){ alert('Error al guardar: ' + error.message); return; }
      await loadAll();
      render();
    };
    addBtn.onclick = addItem;
    input.onkeydown = (e) => { if(e.key==='Enter') addItem(); };
  }
  document.querySelectorAll('.shop-item-check').forEach(el => el.onchange = async () => {
    const { error } = await sb.from('shopping_list_manual').update({ checked: el.checked }).eq('id', el.dataset.id);
    if(error){ alert('Error: ' + error.message); return; }
    await loadAll();
    render();
  });
  document.querySelectorAll('[data-remove-shop-item]').forEach(b => b.onclick = async () => {
    const { error } = await sb.from('shopping_list_manual').delete().eq('id', b.dataset.removeShopItem);
    if(error){ alert('Error: ' + error.message); return; }
    await loadAll();
    render();
  });
  document.querySelectorAll('[data-quick-purchase-ingredient]').forEach(b => b.onclick = () => {
    MODAL = { type:'newPurchase', prefillIngredientId: b.dataset.quickPurchaseIngredient };
    renderModal();
  });
}

/* ===================== SCROLL: ocultar/mostrar menú mobile ===================== */
let lastScrollY = 0;
window.addEventListener('scroll', () => {
  const navbar = document.querySelector('.mobile-navbar');
  if(!navbar || window.innerWidth > 760) return;
  const y = window.scrollY;
  if(y > lastScrollY && y > 60){ navbar.classList.add('nav-hidden'); }
  else { navbar.classList.remove('nav-hidden'); }
  lastScrollY = y;
}, { passive: true });

/* ===================== INIT ===================== */
init();
</script>
